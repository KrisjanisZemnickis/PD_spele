<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet opening</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 id="myID">0</h1>

    <p class="Cena" id="cena1">100</p>
    <p class="Cena" id="cena2">500</p>
    <p class="Cena" id="cena3">1250</p>

    <div class="pogas">
        <button id="btn">POGA</button>
        <button id="upgradeBtn">Uzlabot</button>

        <div>
            <img class="olas" src="pirmaola-Photoroom.png">
            <img class="olas" src="otraola-Photoroom.png">
            <img class="olas" src="tresaola-Photoroom.png">
        </div>
    </div>

    <!-- 🐾 PET -->
    <div id="petContainer"></div>

<script>
const el = document.getElementById("myID")
const btn = document.getElementById("btn")
const upgradeBtn = document.getElementById("upgradeBtn")

let amount = 0
let bonus = 1
let cost = 500

let petsPerSecond = 0 
let showingMessage = false;

// 🐾 SAVĀKTIE PET
let ownedPets = [];

upgradeBtn.innerHTML = "Upgrade: " + cost

// ⏱ AUTO INCOME
setInterval(() => {
    amount += petsPerSecond;

    if (!showingMessage) {
        el.innerHTML = amount;
    }
}, 1000);

// 🖱 CLICK
btn.addEventListener("click", () => {
    amount += bonus
    el.innerHTML = amount
})

// ⬆️ UPGRADE
upgradeBtn.addEventListener("click", () => {
    if (amount >= cost) {
        amount -= cost
        el.innerHTML = amount
        bonus += 1
        upgradeBtn.remove();
    } else {
        alert("Nepietiek līdzekļu!")
    }
})

// 🥚 HATCH ANIMĀCIJA
const eggs = document.querySelectorAll(".olas");

eggs.forEach((egg, index) => {

    egg.addEventListener("click", () => {

        egg.classList.remove("hatching");

        void egg.offsetWidth;

        egg.classList.add("hatching");

        setTimeout(() => {

            hatchPet(index);

            egg.classList.remove("hatching");

        }, 800);

    });

});

// 🐾 PIEVIENO PET
function addPetToScreen(pet) {

    const container = document.getElementById("petContainer");

    const div = document.createElement("div");

    div.classList.add("pet");

    div.innerText = pet.name;

    container.appendChild(div);
}

// 🥚 HATCH FUNKCIJA
function hatchPet(index) {

    let pets;

    if (index === 0) {

        pets = [
            { name: "Mouse 🐭", value: 1 },
            { name: "Cat 🐱", value: 2 },
            { name: "Dog 🐶", value: 3 }
        ];

    } else if (index === 1) {

        pets = [
            { name: "Fox 🦊", value: 6 },
            { name: "Wolf 🐺", value: 10 },
            { name: "Bear 🐻", value: 15 }
        ];

    } else {

        pets = [
            { name: "Unicorn 🦄", value: 30 },
            { name: "Phoenix 🔥", value: 50 },
            { name: "Dragon 🐉", value: 100 }
        ];
    }

    const priceElement = document.getElementById("cena" + (index + 1));

    const price = parseInt(priceElement.innerText);

    if (amount >= price) {

        // filtrē esošos pet
        const availablePets = pets.filter(p => !ownedPets.includes(p.name));

        if (availablePets.length === 0) {

            alert("Visi šie mājdzīvnieki jau iegūti!");

            return;
        }

        amount -= price;

        const randomPet = availablePets[Math.floor(Math.random() * availablePets.length)];

        ownedPets.push(randomPet.name);

        petsPerSecond += randomPet.value;

        addPetToScreen(randomPet);

        // ziņa
        showingMessage = true;

        el.innerHTML = "You got: " + randomPet.name + " (+" + randomPet.value + "/s)";

        setTimeout(() => {

            showingMessage = false;

            el.innerHTML = amount;

        }, 2000);

    } else {

        alert("Nepietiek līdzekļu!");
    }
}
</script>

</body>
</html>
