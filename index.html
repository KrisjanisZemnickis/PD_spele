<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet opening</title>
    <script src="script1.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 id="myID">0</h1>
    <div class="pogas">
        <button id="btn">POGA</button>
        <button id="upgradeBtn">Uzlabot</button>
        <div>
            <img class="olas" src="pirmaola-Photoroom.png">
            <img class="olas" src="otraola-Photoroom.png">
            <img class="olas" id="Tola" src="tresaola-Photoroom.png">
        </div>
    </div>
</body>
<script>
    const el = document.getElementById("myID")
    const btn = document.getElementById("btn")
    const upgradeBtn = document.getElementById("upgradeBtn")


    let amount = 0
    let bonus = 1
    let cost = 500
    upgradeBtn.innerHTML = "Upgrade: " + cost

    btn.addEventListener("click", () => {
        amount += bonus //amount = amount + bonus
        el.innerHTML = amount
        el.style.color = "red"
    })

    upgradeBtn.addEventListener("click", () => {
        if (amount >= cost) {
            amount -= cost
            el.innerHTML = amount
            upgradeBtn.innerHTML = "Upgrade: " + cost
            bonus += 1
            upgradeBtn.remove();
        }else {
            alert("Nepietiek līdzekļu!")
        }
    })

    console.log(el.innerHTML)

const eggs = document.querySelectorAll(".olas");

eggs.forEach((egg, index) => {
    egg.addEventListener("click", () => {
        hatchPet(index);
    });
});

function hatchPet(index) {
    let pets;

    if (index === 0) {
        pets = ["Dog 🐶", "Cat 🐱", "Mouse 🐭"];
    } else if (index === 1) {
        pets = ["Fox 🦊", "Wolf 🐺", "Bear 🐻"];
    } else {
        pets = ["Dragon 🐉", "Phoenix 🔥", "Unicorn 🦄"];
    }

    const randomPet = pets[Math.floor(Math.random() * pets.length)];
    document.getElementById("myID").innerHTML = "You got: " + randomPet;
}

</script>
</html>
